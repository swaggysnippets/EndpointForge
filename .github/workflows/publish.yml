name: Publish to PowerShell Gallery

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: powershell-gallery-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  POWERSHELLGET_VERSION: '2.2.5'
  PESTER_VERSION: '5.7.1'
  PSSCRIPTANALYZER_VERSION: '1.25.0'

jobs:
  publish:
    name: Test, stage, verify, and publish
    runs-on: windows-latest
    timeout-minutes: 30
    environment: powershell-gallery
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 1
          persist-credentials: false
      - name: Install pinned release tools
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          [Net.ServicePointManager]::SecurityProtocol = [Net.ServicePointManager]::SecurityProtocol -bor [Net.SecurityProtocolType]::Tls12
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PowerShellGet -RequiredVersion $env:POWERSHELLGET_VERSION -Scope CurrentUser -Force -AllowClobber
          Import-Module PowerShellGet -RequiredVersion $env:POWERSHELLGET_VERSION -Force

          # Isolate community-signed Pester from the Microsoft-signed inbox copy.
          $toolRoot = Join-Path $env:RUNNER_TEMP 'EndpointForgeModules'
          $null = New-Item -ItemType Directory -Path $toolRoot -Force
          Save-Module Pester -RequiredVersion $env:PESTER_VERSION -Path $toolRoot -Repository PSGallery
          Save-Module PSScriptAnalyzer -RequiredVersion $env:PSSCRIPTANALYZER_VERSION -Path $toolRoot -Repository PSGallery
          $env:PSModulePath = "$toolRoot;$env:PSModulePath"
          "PSModulePath=$env:PSModulePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          $powerShellGet = Get-Module PowerShellGet | Where-Object Version -eq ([version]$env:POWERSHELLGET_VERSION)
          $pester = Test-ModuleManifest (Join-Path $toolRoot "Pester\$env:PESTER_VERSION\Pester.psd1") -ErrorAction Stop
          $analyzer = Test-ModuleManifest (Join-Path $toolRoot "PSScriptAnalyzer\$env:PSSCRIPTANALYZER_VERSION\PSScriptAnalyzer.psd1") -ErrorAction Stop
          if ($null -eq $powerShellGet -or
              $pester.Version -ne [version]$env:PESTER_VERSION -or
              $analyzer.Version -ne [version]$env:PSSCRIPTANALYZER_VERSION) {
            throw 'The resolved release-tool versions do not match the pinned versions.'
          }
      - name: Verify release tag
        shell: powershell
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          $manifest = Test-ModuleManifest .\EndpointForge.psd1 -ErrorAction Stop
          $expectedTag = "v$($manifest.Version)"
          if ($env:RELEASE_TAG -ne $expectedTag) {
            throw "Release tag '$env:RELEASE_TAG' must match manifest version '$expectedTag'."
          }
      - name: Run quality gate
        shell: powershell
        run: .\build\Test-Module.ps1 -RequireScriptAnalyzer
      - name: Run Pester
        shell: powershell
        run: |
          $null = New-Item -ItemType Directory -Path .\TestResults -Force
          .\build\Invoke-PesterTests.ps1 -TestResultPath .\TestResults\pester-release.xml
      - name: Build staged module
        shell: powershell
        run: .\build\Build-Module.ps1 -SkipTests
      - name: Verify staged module and SHA-256 inventory
        shell: powershell
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          .\build\Test-StagedModule.ps1 -ModulePath .\artifacts\EndpointForge
          .\build\Test-PublishReadiness.ps1 -ModulePath .\artifacts\EndpointForge
          $stagedManifest = Test-ModuleManifest .\artifacts\EndpointForge\EndpointForge.psd1 -ErrorAction Stop
          if ($env:RELEASE_TAG -ne "v$($stagedManifest.Version)") {
            throw "The staged module version '$($stagedManifest.Version)' does not match release '$env:RELEASE_TAG'."
          }
      - name: Upload tested release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: EndpointForge-${{ github.event.release.tag_name }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 90
      - name: Publish tested module
        shell: powershell
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ([string]::IsNullOrWhiteSpace($env:PSGALLERY_API_KEY)) {
            throw 'PSGALLERY_API_KEY is not configured.'
          }

          Import-Module PowerShellGet -RequiredVersion $env:POWERSHELLGET_VERSION -Force
          $publishCommand = Get-Command Publish-Module -Module PowerShellGet -ErrorAction Stop
          if ($publishCommand.Version -ne [version]$env:POWERSHELLGET_VERSION) {
            throw "Publish-Module must come from PowerShellGet $($env:POWERSHELLGET_VERSION)."
          }

          Publish-Module -Path .\artifacts\EndpointForge -NuGetApiKey $env:PSGALLERY_API_KEY -Repository PSGallery -ErrorAction Stop
