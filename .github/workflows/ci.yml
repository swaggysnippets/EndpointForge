name: CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  POWERSHELLGET_VERSION: '2.2.5'
  PESTER_VERSION: '5.7.1'
  PSSCRIPTANALYZER_VERSION: '1.25.0'

jobs:
  test-windows-powershell:
    name: Windows PowerShell 5.1
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install pinned quality tools
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          [Net.ServicePointManager]::SecurityProtocol = [Net.ServicePointManager]::SecurityProtocol -bor [Net.SecurityProtocolType]::Tls12
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PowerShellGet -RequiredVersion $env:POWERSHELLGET_VERSION -Scope CurrentUser -Force -AllowClobber
          Import-Module PowerShellGet -RequiredVersion $env:POWERSHELLGET_VERSION -Force

          # Save test tools into an isolated path. This avoids replacing the
          # Microsoft-signed inbox Pester without bypassing publisher validation.
          $toolRoot = Join-Path $env:RUNNER_TEMP 'EndpointForgeModules'
          $null = New-Item -ItemType Directory -Path $toolRoot -Force
          Save-Module Pester -RequiredVersion $env:PESTER_VERSION -Path $toolRoot -Repository PSGallery
          Save-Module PSScriptAnalyzer -RequiredVersion $env:PSSCRIPTANALYZER_VERSION -Path $toolRoot -Repository PSGallery
          $env:PSModulePath = "$toolRoot;$env:PSModulePath"
          "PSModulePath=$env:PSModulePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          $pester = Test-ModuleManifest (Join-Path $toolRoot "Pester\$env:PESTER_VERSION\Pester.psd1") -ErrorAction Stop
          $analyzer = Test-ModuleManifest (Join-Path $toolRoot "PSScriptAnalyzer\$env:PSSCRIPTANALYZER_VERSION\PSScriptAnalyzer.psd1") -ErrorAction Stop
          if ($pester.Version -ne [version]$env:PESTER_VERSION -or
              $analyzer.Version -ne [version]$env:PSSCRIPTANALYZER_VERSION) {
            throw 'The resolved quality-tool versions do not match the pinned versions.'
          }
      - name: Run quality gate
        shell: powershell
        run: .\build\Test-Module.ps1 -RequireScriptAnalyzer
      - name: Run Pester
        shell: powershell
        run: |
          $null = New-Item -ItemType Directory -Path .\TestResults -Force
          .\build\Invoke-PesterTests.ps1 -TestResultPath .\TestResults\pester-5.1.xml
      - name: Upload Pester results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pester-windows-powershell
          path: TestResults/*.xml
          if-no-files-found: warn
          retention-days: 14

  test-powershell:
    name: PowerShell 7
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install pinned quality tools
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PowerShellGet -RequiredVersion $env:POWERSHELLGET_VERSION -Scope CurrentUser -Force -AllowClobber
          Import-Module PowerShellGet -RequiredVersion $env:POWERSHELLGET_VERSION -Force

          $toolRoot = Join-Path $env:RUNNER_TEMP 'EndpointForgeModules'
          $null = New-Item -ItemType Directory -Path $toolRoot -Force
          Save-Module Pester -RequiredVersion $env:PESTER_VERSION -Path $toolRoot -Repository PSGallery
          Save-Module PSScriptAnalyzer -RequiredVersion $env:PSSCRIPTANALYZER_VERSION -Path $toolRoot -Repository PSGallery
          $env:PSModulePath = "$toolRoot;$env:PSModulePath"
          "PSModulePath=$env:PSModulePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          $pester = Test-ModuleManifest (Join-Path $toolRoot "Pester\$env:PESTER_VERSION\Pester.psd1") -ErrorAction Stop
          $analyzer = Test-ModuleManifest (Join-Path $toolRoot "PSScriptAnalyzer\$env:PSSCRIPTANALYZER_VERSION\PSScriptAnalyzer.psd1") -ErrorAction Stop
          if ($pester.Version -ne [version]$env:PESTER_VERSION -or
              $analyzer.Version -ne [version]$env:PSSCRIPTANALYZER_VERSION) {
            throw 'The resolved quality-tool versions do not match the pinned versions.'
          }
      - name: Run quality gate
        shell: pwsh
        run: .\build\Test-Module.ps1 -RequireScriptAnalyzer
      - name: Run Pester
        shell: pwsh
        run: |
          $null = New-Item -ItemType Directory -Path .\TestResults -Force
          .\build\Invoke-PesterTests.ps1 -TestResultPath .\TestResults\pester-7.xml
      - name: Upload Pester results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pester-powershell-7
          path: TestResults/*.xml
          if-no-files-found: warn
          retention-days: 14

  build:
    name: Build and verify staged module
    needs: [test-windows-powershell, test-powershell]
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Build staged module
        shell: powershell
        run: .\build\Build-Module.ps1 -SkipTests
      - name: Verify staged module and SHA-256 inventory
        shell: powershell
        run: |
          .\build\Test-StagedModule.ps1 -ModulePath .\artifacts\EndpointForge
          .\build\Test-PublishReadiness.ps1 -ModulePath .\artifacts\EndpointForge
      - name: Upload verified module
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: EndpointForge-module
          path: artifacts/
          if-no-files-found: error
          retention-days: 30
